     <h2>Exemplo de botão desabilitado</h2>

     <h2>Exemplo de botão com JavaScript</h2>
     <button onclick="alert('Somente a dor coletviva gera união! ')">Clique aqui</button>

        <label>Primeiro nome</label>
        <input type="text">
        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
     </form>
