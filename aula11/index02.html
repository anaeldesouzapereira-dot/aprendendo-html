<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>aula11 html</title>
</head>
<body>
    <!-- Utilizando iframe no html -->
     <h2>Exemplos de iframe no html</h2>
     <iframe src="index.html" width="400" height="300" title="iframe Exemplo"></iframe>
     <hr>
     <h2>Exemplo de iframe sem a borda</h2>
     <iframe src="index.html" width="400" height="300" title="iframe Exemplo" style="border: none;"></iframe>
     <hr>
     <h2>Exemplo de iframe com a borda estilizada</h2>
     <iframe src="index.html" width="400" height="300" title="iframe Exemplo" style="border: 6px solid orangered;"></iframe>
     <hr>
     <h2>Exemplo de target para iframe</h2>
     <iframe src="index.html" width="300" height="250" name="iframe1"></iframe>
     <br>
     <a href="https://www.netflix.com" target="iframe1">Site da Netflix</a>
     <hr>
     <iframe
        src="https://www.google.com/maps/d/embed?mid=1uyxnw5SnPSDNnQ-AKLCAMpyoPhB-U5A&ehbc=2E312F&noprof=1"
        width="800"
        height="400"
     ></iframe>
    
</body>
</html>
