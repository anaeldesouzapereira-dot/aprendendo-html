<!DOCTYPE html>
<html lang="pt-br">
<head>
 
    <title>aula9 html</title>
</head>
<body>
       <!-- Listas nao ordenadas -->
     <h2>Trabalhando em listas nao ordenadas</h2>
     <!-- Exemplos de marcadores de lista nao ordenadas -->
     <ul style="list-style-type: disc;">
        <li>Laranja</li>
        <li>Mangá</li>
        <li>Carambola</li>
     </ul>
     <hr>
        <ul style="list-style-type: circle;">
            <li>Café</li>
            <li>Suco</li>
            <li>Agua</li>
        </ul>
        <hr>
        <ul style="list-style-type: square;">
            <li>17</li>
            <li>05</li>
            <li>07</li>
        </ul>
        <hr>
        <ul style="list-style-type: none;">
            <li>Moto</li>
            <li>Carro</li>
            <li>Caminhao</li>
        </ul>
        <hr>
        <!-- Exemplos de listas nao ordenadas alinhadas -->
         <h2>Listas aninhadas</h2>
         <ul>
            <li>Laranja</li>
            <li>Maça</li>
            <li>Banana</li>
            <ul>
                <li>Carro</li>
                <li>Moto</li>
                <li>Barco</li>
            </ul>
            <li>Pera</li>
            <li>Uva</li>
         </ul>
</body>
</html>
