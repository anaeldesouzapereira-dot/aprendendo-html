<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>aula9 html</title>
    <style>
        table, th, td {
            border: 2px solid black;
        }
    </style>
</head>
<body>
  <!--Adicionando tabelas no html-->  
  <h2>Definindo tabelas no html</h2>
  <table style="width: 100%;">
    <tr>
        <th>Título 1</th>
        <th>Título 2</th>
        <th>Título 3</th>
    </tr>
    <tr>
        <td>Laranja</td>
        <td>Banana</td>
        <td>Maça</td>
    </tr>
    <tr>
        <td>30</td>
        <td>03</td>
        <td>23</td>
    </tr>

  </table>
</body>
</html>
