<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>aula9 html</title>
</head>
<body>
    <!--Elementos em bloco e elementos em linha  -->
    <h2>Exemplos de elementos a nível de bloco e a nível de linha (Inline e Block elements)</h2>
    <br>
    <h4>Exemplo de elementos em bloco: </h4>
    <p style="border: 2px solid black;">Somente a dor coletiva gera uniao.</p>
    <div style="border: 2px solid black;">Somente a dor coletiva gera uniao.</div>
    <br>
    <h4>Exemplo de elementos em linha</h4>
    <p>Somente a <span style="border: 2px solid black;">dor coletiva</span> gera uniao.</p>
</body>
</html>
