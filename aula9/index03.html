<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>aula9 html</title>
</head>
<body>
   <!--Definindo lista nao ordenada no html--> 
   <h2>Exemplo de lista nao ordenada em html (tag ul)</h2>
   <ul>
    <li>Laranja</li>
    <li>Morango</li>
    <li>Uva</li>
   </ul>
   <hr>
   <!-- Definindo lista ordenada no html -->
    <h2>Exemplo de lista ordenada em html (tag ol)</h2>
    <ol>
        <li>Tangerina</li>
        <li>Pera</li>
        <li>Maça</li>
    </ol>
    <hr>
    <!-- Definindo lista descritiva no html -->
     <h2>Exemplo de lista descritiva em html (tag dl)
        <dl>
            <dt>Café</dt>
            <dd>- Bebida quente</dd>
            <dt>Suco</dt>
            <dd>- Bebida fria</dd>
        </dl>
     </h2>
</body>
</html>
